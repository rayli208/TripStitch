<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="theme-color" content="#FFF8F0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="description" content="Turn your travel photos into cinematic videos with animated map transitions, custom branding, and voice-over — all in your browser. Free, no watermarks." />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="TripStitch" />
		<meta property="og:image" content="https://tripstitch.blog/logo-title.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://tripstitch.blog/logo-title.png" />
		<link rel="canonical" href="https://tripstitch.blog" />
		<script>
			(function() {
				var s = localStorage.getItem('theme-mode');
				var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
				if (s === 'dark' || (s !== 'light' && d)) {
					document.documentElement.classList.add('dark');
				}
				})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
